<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 12px;
      }
      .card {
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        margin: 4px 0;
        padding: 8px 10px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        background: #f8f9fa;
        cursor: pointer;
      }
      button:hover {
        background: #eef3fd;
      }
      pre {
        white-space: pre-wrap;
        background: #f8f9fa;
        padding: 8px;
        border-radius: 6px;
        font-size: 12px;
      }
      .status {
        font-size: 12px;
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <h1>Revenue Ops Command Center</h1>

    <div class="card">
      <div class="status" id="runtimeStatus">Loading runtime status…</div>
      <div class="status" id="automationStatus">Loading automation status…</div>
      <button onclick="runAction('setup')">Setup / Repair Workbook</button>
      <button onclick="runAction('pauseAutomation')">Pause Scheduled Automation</button>
      <button onclick="runAction('resumeAutomation')">Resume Scheduled Automation</button>
      <button onclick="runAction('refreshPlatform')">Refresh Platform Views</button>
      <button onclick="runAction('processQueue')">Process AI Queue</button>
      <button onclick="runAction('maintenance')">Run Hourly Maintenance</button>
      <button onclick="runAction('digest')">Send Daily Digests</button>
    </div>

    <div class="card">
      <strong>Platform</strong>
      <pre id="platformInfo">Loading platform status…</pre>
    </div>

    <div class="card">
      <strong>Selected row actions</strong>
      <button onclick="runAction('leadScore')">Queue Lead Score</button>
      <button onclick="runAction('accountBrief')">Queue Account Brief</button>
      <button onclick="runAction('followupDraft')">Queue Follow-Up Draft</button>
      <button onclick="runAction('gmailDraft')">Create Gmail Draft</button>
    </div>

    <div class="card">
      <strong>Selection</strong>
      <pre id="selectionInfo">Loading selection…</pre>
    </div>

    <div class="card">
      <strong>Last result</strong>
      <pre id="resultInfo">No actions run yet.</pre>
    </div>

    <script>
      function refresh() {
        google.script.run.withSuccessHandler(function (data) {
          document.getElementById('runtimeStatus').textContent =
            'Queue: ' + JSON.stringify(data.queue) + ' | Runtime: ' + JSON.stringify(data.runtime);
          document.getElementById('automationStatus').textContent =
            'Automation: ' + JSON.stringify(data.automation);
          document.getElementById('platformInfo').textContent = JSON.stringify(data.platform, null, 2);
        }).sidebarGetStatus();

        google.script.run.withSuccessHandler(function (data) {
          document.getElementById('selectionInfo').textContent = JSON.stringify(data, null, 2);
        }).sidebarGetSelection();
      }

      function runAction(action) {
        document.getElementById('resultInfo').textContent = 'Running ' + action + '…';
        google.script.run
          .withSuccessHandler(function (result) {
            document.getElementById('resultInfo').textContent = JSON.stringify(result, null, 2);
            refresh();
          })
          .withFailureHandler(function (error) {
            document.getElementById('resultInfo').textContent = String(error);
          })
          .sidebarRunAction(action);
      }

      refresh();
    </script>
  </body>
</html>
